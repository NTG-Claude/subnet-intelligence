name: Daily Subnet Scoring

on:
  schedule:
    - cron: '0 6 * * *'   # täglich 06:00 UTC
  workflow_dispatch:        # manuell auslösbar

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run database migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Compute subnet scores
        run: |
          mkdir -p logs
          python -m scorer.run --all-subnets --verbose 2>&1 | tee logs/score-run.log
        env:
          TAOSTATS_API_KEY: ${{ secrets.TAOSTATS_API_KEY }}
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}

      - name: Upload score artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: score-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
